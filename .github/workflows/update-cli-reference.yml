name: Update CLI reference

# Regenerates docs/configure-prysm/command-line-options.md from the Prysm help
# endpoint (cli.prylabs.network) and opens a PR if anything changed.
# create-pull-request is idempotent: no diff -> no PR.

on:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # No install needed: the generator uses only Node builtins + global fetch.
      - run: node scripts/generate-cli-reference.mjs

      # Latest Prysm release tag, for the PR title/commit message only.
      - id: prysm
        run: |
          tag=$(curl -sf https://api.github.com/repos/OffchainLabs/prysm/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "tag=${tag:-latest}" >> "$GITHUB_OUTPUT"

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: update CLI reference from Prysm ${{ steps.prysm.outputs.tag }}'
          title: 'chore: update CLI reference from Prysm ${{ steps.prysm.outputs.tag }}'
          body: |
            Automated update of the command-line options reference from
            `cli.prylabs.network`, created by the `update-cli-reference` workflow.
          branch: automated/update-cli-reference
          delete-branch: true
